name: Build Windows Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  windows-release:
    runs-on: windows-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Create build environment
        shell: pwsh
        run: |
          python -m venv .venv
          .\.venv\Scripts\python.exe -m pip install --upgrade pip
          .\.venv\Scripts\python.exe -m pip install -r requirements.txt -r requirements-build.txt
          choco install innosetup --no-progress -y

      - name: Run tests
        shell: pwsh
        run: .\.venv\Scripts\python.exe -m unittest discover -s tests -v

      - name: Verify tag matches application version
        shell: pwsh
        run: |
          $appVersion = .\.venv\Scripts\python.exe -c "from src.version import __version__; print(__version__)"
          $tagVersion = "${{ github.ref_name }}".TrimStart("v")
          if ($appVersion.Trim() -ne $tagVersion) {
            throw "Tag version $tagVersion does not match src/version.py $appVersion"
          }

      - name: Build installer
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart("v")
          powershell -NoProfile -ExecutionPolicy Bypass -File scripts\build_windows_release.ps1 -Version $version

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" `
            "release\AI_Notion_Note_Organizer_Setup.exe" `
            --title "AI Notion 筆記整理器 ${{ github.ref_name }}" `
            --generate-notes
